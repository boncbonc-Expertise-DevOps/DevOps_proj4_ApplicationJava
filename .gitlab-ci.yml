stages:
  - test
  - quality

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

angular_tests:
  stage: test
  image: cypress/browsers:node-22.15.0-chrome-136.0.7103.92-1-ff-138.0.1-edge-136.0.3240.50-1
  rules:
    - exists:
        - package.json
        - karma.conf.js
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - chmod +x run-tests.sh
    - ./run-tests.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - test-results/
      - reports/
      - coverage/
    reports:
      junit:
        - test-results/**/*.xml

java_tests:
  stage: test
  image: gradle:8.10.2-jdk21
  rules:
    - exists:
        - build.gradle
  cache:
    key:
      files:
        - build.gradle
        - settings.gradle
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - .gradle/caches/
      - .gradle/wrapper/
    policy: pull-push
  script:
    - chmod +x run-tests.sh
    - ./run-tests.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - test-results/
      - build/reports/tests/test/
      - build/test-results/test/
    reports:
      junit:
        - test-results/**/*.xml

angular_lint:
  stage: quality
  image: node:22-bullseye
  rules:
    - exists:
        - package.json
        - angular.json
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint --if-present

java_lint:
  stage: quality
  image: gradle:8.10.2-jdk21
  rules:
    - exists:
        - build.gradle
  cache:
    key:
      files:
        - build.gradle
        - settings.gradle
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - .gradle/caches/
      - .gradle/wrapper/
    policy: pull-push
  script:
    - chmod +x gradlew
    - |
      if ./gradlew -q tasks --all | grep -q "checkstyleMain"; then
        ./gradlew --no-daemon checkstyleMain checkstyleTest
      else
        echo "No Checkstyle tasks configured; skipping Java lint stage."
      fi
